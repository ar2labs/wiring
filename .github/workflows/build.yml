name: build

on: [push, pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  run:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ ubuntu-latest ]
        php-versions: ['8.5']
    name: PHP ${{ matrix.php-versions }} Test on ${{ matrix.operating-system }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: mbstring, intl, zip
          coverage: xdebug

      - name: Check PHP Version
        run: php -v

      - name: Check Composer Version
        run: composer -V

      - name: Check PHP Extensions
        run: php -m

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install required dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Audit locked dependencies
        run: composer audit --locked --abandoned=fail

      - name: Check platform requirements
        run: composer check-platform-reqs

      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Run PHP-CS-Fixer dry run
        run: vendor/bin/php-cs-fixer fix --config=php_cs.dist --dry-run --diff --no-interaction

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --configuration phpstan.neon --no-progress --ansi

      - name: Run PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml.dist --colors=always

      - name: Generate Clover coverage
        run: vendor/bin/phpunit --configuration phpunit.xml.dist --coverage-clover build/logs/clover.xml --colors=always
