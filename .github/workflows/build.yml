name: build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  run:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [ ubuntu-latest, windows-latest ]
        php: ['8.5']
        dependencies: [ locked ]
        include:
          - operating-system: ubuntu-latest
            php: '8.5'
            dependencies: lowest
    name: PHP ${{ matrix.php }} ${{ matrix.dependencies }} on ${{ matrix.operating-system }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, zip
          coverage: xdebug

      - name: Check PHP Version
        run: php -v

      - name: Check Composer Version
        run: composer -V

      - name: Check PHP Extensions
        run: php -m

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install locked dependencies
        if: matrix.dependencies == 'locked'
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install lowest supported dependencies
        if: matrix.dependencies == 'lowest'
        run: composer update --prefer-lowest --prefer-stable --no-interaction --no-progress

      - name: Audit locked dependencies
        if: matrix.dependencies == 'locked'
        run: composer audit --locked --abandoned=fail

      - name: Check platform requirements
        run: composer check-platform-reqs

      - name: Review dependency changes
        if: github.event_name == 'pull_request' && matrix.operating-system == 'ubuntu-latest' && matrix.dependencies == 'locked'
        uses: actions/dependency-review-action@v4

      - name: Run PHP-CS-Fixer dry run
        run: composer php-cs-fixer-check

      - name: Run PHPStan
        run: php vendor/bin/phpstan analyse --configuration phpstan.neon --no-progress --ansi

      - name: Run PHPUnit
        run: php vendor/bin/phpunit --configuration phpunit.xml.dist --colors=always

      - name: Generate Clover coverage
        if: matrix.operating-system == 'ubuntu-latest' && matrix.dependencies == 'locked'
        run: php vendor/bin/phpunit --configuration phpunit.xml.dist --coverage-clover build/logs/clover.xml --log-junit build/logs/junit.xml --colors=always

      - name: Upload coverage to Coveralls
        if: matrix.operating-system == 'ubuntu-latest' && matrix.dependencies == 'locked'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: build/logs/clover.xml
          format: clover

      - name: Run SonarQube Cloud analysis
        if: matrix.operating-system == 'ubuntu-latest' && matrix.dependencies == 'locked'
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
